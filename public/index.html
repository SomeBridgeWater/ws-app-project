<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket チャット</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      min-height: 100vh;
    }

    h1 { margin-bottom: 16px; color: #333; }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    #status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
      background: #e0e0e0;
      color: #666;
    }
    #status-badge.connected { background: #d4edda; color: #155724; }

    #connect-area {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      width: 100%;
      max-width: 600px;
    }

    #usernameInput {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #connectBtn { background: #4caf50; color: #fff; }
    #connectBtn:hover:not(:disabled) { background: #43a047; }
    #disconnectBtn { background: #f44336; color: #fff; }
    #disconnectBtn:hover:not(:disabled) { background: #e53935; }

    #chat-box {
      width: 100%;
      max-width: 600px;
      height: 400px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow-y: auto;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-break: break-word; }

    .system-msg {
      align-self: center;
      background: none;
      color: #999;
      font-style: italic;
      font-size: 12px;
      max-width: 100%;
    }

    .my-msg {
      align-self: flex-end;
      background: #dcf8c6;
      color: #222;
    }
    .my-msg .name { font-weight: bold; font-size: 12px; color: #4caf50; display: block; margin-bottom: 2px; }

    .other-msg {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e0e0e0;
      color: #222;
    }
    .other-msg .name { font-weight: bold; font-size: 12px; color: #1976d2; display: block; margin-bottom: 2px; }

    #send-area {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 600px;
    }

    #messageInput {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    #sendBtn { background: #1976d2; color: #fff; }
    #sendBtn:hover:not(:disabled) { background: #1565c0; }
  </style>
</head>
<body>
  <h1>WebSocket チャット</h1>

  <div id="status-bar">
    <span>接続状態:</span>
    <span id="status-badge">未接続</span>
  </div>

  <div id="connect-area">
    <input type="text" id="usernameInput" placeholder="ユーザー名を入力..." maxlength="20">
    <button id="connectBtn">接続</button>
    <button id="disconnectBtn" disabled>切断</button>
  </div>

  <div id="chat-box"></div>

  <div id="send-area">
    <input type="text" id="messageInput" placeholder="メッセージを入力..." disabled>
    <button id="sendBtn" disabled>送信</button>
  </div>

  <script>
    let ws = null;
    let myUsername = '';

    const statusBadge = document.getElementById('status-badge');
    const usernameInput = document.getElementById('usernameInput');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function setConnectedState(connected) {
      if (connected) {
        statusBadge.textContent = '接続中';
        statusBadge.className = 'connected';
        usernameInput.disabled = true;
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();
      } else {
        statusBadge.textContent = '未接続';
        statusBadge.className = '';
        usernameInput.disabled = false;
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        messageInput.disabled = true;
        sendBtn.disabled = true;
      }
    }

    function appendMessage(data) {
      const div = document.createElement('div');

      if (data.type === 'join' || data.type === 'leave') {
        div.className = 'msg system-msg';
        const action = data.type === 'join' ? '入室' : '退室';
        div.textContent = `${data.username} が${action}しました (${data.timestamp})`;

      } else if (data.type === 'message') {
        const isMine = data.username === myUsername;
        div.className = `msg ${isMine ? 'my-msg' : 'other-msg'}`;
        const nameSpan = document.createElement('span');
        nameSpan.className = 'name';
        nameSpan.textContent = data.username;
        const textNode = document.createTextNode(data.text);
        div.appendChild(nameSpan);
        div.appendChild(textNode);
      }

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function connect() {
      myUsername = usernameInput.value.trim();
      if (!myUsername) {
        alert('ユーザー名を入力してください。');
        return;
      }

      ws = new WebSocket(`ws://${location.host}`);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'join', username: myUsername }));
        setConnectedState(true);
      };

      ws.onmessage = (event) => {
        let data;
        try { data = JSON.parse(event.data); } catch (e) { return; }
        appendMessage(data);
      };

      ws.onclose = () => {
        setConnectedState(false);
        ws = null;
      };

      ws.onerror = () => {
        setConnectedState(false);
        ws = null;
      };
    }

    function disconnect() {
      if (ws) ws.close();
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'message', text }));
      messageInput.value = '';
      messageInput.focus();
    }

    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', disconnect);
    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    usernameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') connect();
    });
  </script>
</body>
</html>
